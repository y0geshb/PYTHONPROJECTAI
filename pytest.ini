[pytest]
addopts = -v --tb=short --log-cli-level=INFO --html=reports/report.html --self-contained-html
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
testpaths = tests

markers =
    smoke: Quick health checks to verify the framework and API are working
    regression: Full regression test suite
    positive: Happy path / success scenario tests
    negative: Error handling and invalid input tests
    security: Authentication, authorisation, and injection tests
    performance: Response time and SLA tests

